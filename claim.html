<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claim KORPO — Free Daily Tokens</title>
  <meta name="description" content="Claim 100 free KORPO tokens daily. No login, no sign-up. Just connect your wallet on Base and claim.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.5/dist/ethers.umd.min.js"></script>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a12;--card:#12121f;--border:#2a2a4a;--text:#f0f0ff;--muted:#8a8aba;--accent:#7c3aed;--accent-light:#a78bfa;--base:#0052ff;--glow:rgba(124,58,237,0.35)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
    .container{max-width:460px;width:100%}
    .brand{text-align:center;margin-bottom:2rem}
    .brand h1{font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#a855f7,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .brand p{color:var(--muted);font-size:1rem;margin-top:.4rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:2rem;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.4)}
    .card h2{font-size:1.35rem;margin-bottom:.3rem}
    .card .day{font-size:.92rem;color:var(--muted);margin-bottom:1.5rem}
    .card .reward{font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:1rem 0}
    .card .reward-label{color:var(--muted);font-size:.87rem;margin-bottom:1.5rem}
    .btn{width:100%;padding:.95rem 1.2rem;font-size:1rem;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--accent),#6366f1);border:none;border-radius:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px var(--glow);margin-top:.5rem}
    .btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 28px var(--glow)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .pill{display:inline-block;padding:.35rem .8rem;background:rgba(0,82,255,0.12);color:#4aa3ff;border:1px solid rgba(0,82,255,0.2);border-radius:999px;font-size:.8rem;font-weight:600;margin-bottom:1.2rem}
    .status{margin-top:1.2rem;font-size:.92rem;min-height:1.4rem;color:var(--muted)}
    .status.ok{color:#48bb78}
    .status.err{color:#f56565}
    .link-row{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-top:2rem;font-size:.85rem;color:var(--muted)}
    .link-row a{color:var(--accent-light);text-decoration:none}
    .link-row a:hover{text-decoration:underline}
    .back{position:absolute;top:1.2rem;left:1.2rem;color:var(--muted);text-decoration:none;font-size:.9rem}
    .back:hover{color:var(--text)}
    input[type=number]{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,0.03);color:var(--text);font-size:1rem;margin-bottom:1rem}
    input:focus{outline:none;border-color:var(--accent-light)}
    @media(max-width:480px){.brand h1{font-size:2rem}}
  </style>
</head>
<body>
  <a href="/" class="back">← Back to korpo.pro</a>
  <div class="container">
    <div class="brand">
      <h1>🔮 KORPO</h1>
      <p>Free daily. Built-in burn. No insiders.</p>
    </div>
    <div class="card">
      <div class="pill">Base Mainnet</div>
      <h2>Claim Your Daily Reward</h2>
      <div class="day">Available once every 24 hours</div>
      <div class="reward">100 KORPO</div>
      <div class="reward-label">~ 0.0005 WETH at current pool price</div>
      <button id="connectBtn" class="btn">Connect Wallet</button>
      <div id="claimSection" style="display:none">
        <div class="day" id="canClaimStatus">Checking claim status...</div>
        <button id="claimBtn" class="btn" disabled>Claim KORPO</button>
      </div>
      <div id="status" class="status"></div>
    </div>
    <div class="link-row">
      <a href="https://basescan.org/token/0xF970c93D00De94786F6fdABBc63180da1D981bc7" target="_blank">Basescan</a>
      <span>·</span>
      <a href="https://app.uniswap.org/#/pool/0x92d0d85B9733C4e3A7D3027A6F00c0e0dE45C6C1" target="_blank">Uniswap Pool</a>
      <span>·</span>
      <a href="/liquidity.html" target="_blank">Provide Liquidity</a>
    </div>
  </div>

<script>
const KORPO = '0xF970c93D00De94786F6fdABBc63180da1D981bc7';
const ABI = [
  'function claim() external',
  'function canClaim(address) view returns (bool)',
  'function nextClaimTime(address) view returns (uint256)',
  'function balanceOf(address) view returns (uint256)',
  'event Claimed(address indexed user, uint256 amount, uint256 timestamp)',
];
const provider = new ethers.JsonRpcProvider('https://base-rpc.publicnode.com');

let signer, korpo, connectedAddr;
const $ = id => document.getElementById(id);
const status = (text, cls='') => { $('status').textContent = text; $('status').className = 'status ' + cls; };

async function checkClaim(addr) {
  const c = new ethers.Contract(KORPO, ABI, provider);
  const [can, next] = await Promise.all([c.canClaim(addr), c.nextClaimTime(addr)]);
  const now = Math.floor(Date.now()/1000);
  const diff = Number(next) - now;
  if (can) {
    $('canClaimStatus').textContent = '✅ Ready to claim!';
    $('canClaimStatus').style.color = '#48bb78';
    $('claimBtn').disabled = false;
  } else {
    const h = Math.floor(diff/3600);
    const m = Math.floor((diff%3600)/60);
    $('canClaimStatus').textContent = `⏳ Next claim available in ${h}h ${m}m`;
    $('canClaimStatus').style.color = '#a0a0c0';
    $('claimBtn').disabled = true;
  }
}

$('connectBtn').addEventListener('click', async () => {
  if (!window.ethereum) {
    status('Install a wallet (MetaMask, Coinbase Wallet, or Rabby) to continue.', 'err');
    return;
  }
  try {
    status('Connecting...');
    const wa = new ethers.BrowserProvider(window.ethereum);
    await wa.send('eth_requestAccounts', []);
    signer = await wa.getSigner();
    connectedAddr = await signer.getAddress();
    korpo = new ethers.Contract(KORPO, ABI, signer);
    $('connectBtn').style.display = 'none';
    $('claimSection').style.display = 'block';
    status('Connected: ' + connectedAddr.slice(0,6) + '…' + connectedAddr.slice(-4), 'ok');
    await checkClaim(connectedAddr);

    korpo.on('Claimed', (user, amount) => {
      if (user.toLowerCase() === connectedAddr.toLowerCase()) {
        status(`🎉 Claimed ${ethers.formatEther(amount)} KORPO successfully!`, 'ok');
        $('claimBtn').disabled = true;
        checkClaim(connectedAddr);
      }
    });
  } catch (e) {
    status(e.message || 'Connection failed', 'err');
  }
});

$('claimBtn').addEventListener('click', async () => {
  try {
    status('Claiming...');
    const tx = await korpo.claim({ gasLimit: 100000 });
    status('Waiting for confirmation...');
    const rec = await tx.wait();
    if (rec.status === 1) {
      status('Claim successful!', 'ok');
      const after = await korpo.balanceOf(connectedAddr);
      status(`You now have ${Number(ethers.formatEther(after)).toFixed(2)} KORPO`, 'ok');
    }
  } catch (e) {
    const msg = e.reason || e.shortMessage || e.message;
    if (msg.includes('already claimed today')) status('Already claimed today. Come back in 24h.', 'err');
    else if (msg.includes('claims are paused')) status('Claims are paused.', 'err');
    else status(msg, 'err');
  }
});
</script>
</body>
</html>
